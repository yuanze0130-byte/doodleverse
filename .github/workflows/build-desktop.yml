# MakingLovart - Tauri 全平台桌面应用构建
# 
# 触发条件：推送 v* 格式的 tag 时自动构建并发布 Release
# 构建目标：Windows (x64) / macOS (x64 + ARM64) / Linux (x64)
# 
# 必须在 GitHub Repo Settings → Secrets 中配置：
#   TAURI_SIGNING_PRIVATE_KEY - 自动更新签名私钥（src-tauri/.tauri_private_key 文件内容）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - 私钥密码（若生成时无密码则留空）

name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux 构建需要系统级依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 安装 Rust 工具链
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # macOS ARM64 交叉编译需要额外 target
      - name: Add Rust target (macOS ARM64)
        if: matrix.args == '--target aarch64-apple-darwin'
        run: rustup target add aarch64-apple-darwin

      # 安装 Node.js 和前端依赖
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      # 构建 Tauri 应用并生成安装包
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MakingLovart v__VERSION__'
          releaseBody: |
            See the assets below to download and install this version.
            
            **Windows**: Download `.exe` (NSIS installer) or `.msi`
            **macOS**: Download `.dmg`
            **Linux**: Download `.deb` or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
